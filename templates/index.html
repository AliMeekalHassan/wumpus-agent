<!DOCTYPE html>
<html>
<head>
<title>Dynamic Wumpus Logic Agent</title>
<style>
body{
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
  text-align:center;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:700px;
  margin:auto;
}
.grid{
  display:grid;
  gap:4px;
  margin-top:20px;
}
.cell{
  width:45px;height:45px;
  border-radius:6px;
}
.safe{background:#22c55e}
.unknown{background:#64748b}
.danger{background:#ef4444}
button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>
<div class="card">
<h1>🧠 Dynamic Wumpus Agent</h1>

Rows <input id="rows" value="4">
Cols <input id="cols" value="4">
<br>
<button onclick="start()">Start Episode</button>
<button onclick="step()">Next Step</button>

<h3 id="percepts"></h3>
<h3 id="steps"></h3>

<div id="grid" class="grid"></div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
