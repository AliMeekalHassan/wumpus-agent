<!DOCTYPE html>
<html>
<head>
  <title>Dynamic Wumpus Agent</title>
  <script src="/static/script.js"></script>
  <style>
    .grid { display: grid; gap: 2px; }
    .cell { width: 40px; height: 40px; text-align: center; }
    .safe { background: green; }
    .unknown { background: gray; }
    .hazard { background: red; }
  </style>
</head>
<body>
  <h1>Dynamic Wumpus Agent</h1>
  <input id="rows" placeholder="Rows" />
  <input id="cols" placeholder="Cols" />
  <button onclick="startGame()">Start</button>
  <div id="grid"></div>
  <div id="metrics"></div>
</body>
</html>
